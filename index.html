<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PyViz Sandbox | Free Local Python Data Science IDE</title>
    <meta name="title" content="PyViz Sandbox | Free Local Python Data Science IDE">
    <meta name="description" content="Execute heavy Python data science workloads directly in your browser. Zero latency, 100% local privacy, no server costs. Powered by WebAssembly and Pyodide.">
    <meta name="keywords" content="PyViz Sandbox, Python browser IDE, Pyodide, local data science, WASM Python, Pandas in browser">
    <meta name="google-site-verification" content="Ov76G7ShWKMaUpUhGv3XOBxr4leRXUB7wLyeVL9MnIg" />
    
    <!-- Premium Typography: Space Grotesk & JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
      #loading-screen {
        position: fixed;
        inset: 0;
        background: #0E1117;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: 'Space Grotesk', sans-serif;
        color: #e1e2eb;
      }
      .loader {
        width: 48px;
        height: 48px;
        border: 5px solid #191c22;
        border-bottom-color: #00d1ff;
        border-radius: 50%;
        animation: rotation 1s linear infinite;
        margin-bottom: 24px;
      }
      @keyframes rotation {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <div class="loader"></div>
      <div style="font-size: 16px; font-weight: 600; letter-spacing: 0.15em; opacity: 0.9; text-transform: uppercase;">PyViz Sandbox</div>
      <div style="font-size: 10px; margin-top: 10px; opacity: 0.4; letter-spacing: 0.05em;">THE KINETIC SHADOW SYSTEM</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <script>
      window.onload = () => {
        setTimeout(() => {
          const loader = document.getElementById('loading-screen');
          if (loader) loader.style.display = 'none';
        }, 1200);
      };
    </script>
  </body>
</html>
